services:
  postgres:
    image: postgres:17

    container_name: expense-manager-postgres

    environment:
      POSTGRES_DB: expense_manager_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - expense-manager-data:/var/lib/postgresql/data

volumes:
  expense-manager-data: